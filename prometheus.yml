global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: 'log-analyzer'
    static_configs:
      - targets: ['172.17.0.1:8001', '172.17.0.1:8002', '172.17.0.1:8003']
    metrics_path: '/metrics'

remote_write:
  - url: "http://172.17.0.1:8428/api/v1/write"
