apiVersion: 1

groups:
  - orgId: 1
    name: Log Analyzer Alerts
    folder: Log Analyzer Alerts
    interval: 60s
    rules:
      - uid: log-error-alert
        title: Log Error Alert
        condition: A
        queries:
          - refId: A
            model:
              datasource: Prometheus
              expr: 'log_levels_total{level="ERROR"} > 0'
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
        execErrState: Error
        for: 1m
        noDataState: NoData
        annotations:
          summary: '🚨 ERROR in logs: {{ $values.A }} errors'
          description: 'Detected {{ $values.A }} ERROR logs from instance {{ $labels.instance }}'
        labels:
          service: log-analyzer
          severity: critical

      - uid: log-warning-alert
        title: Log Warning Alert
        condition: A
        queries:
          - refId: A
            model:
              datasource: Prometheus
              expr: 'log_levels_total{level="WARNING"} > 5'
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
        execErrState: Error
        for: 1m
        noDataState: NoData
        annotations:
          summary: '⚠️ WARNING in logs: {{ $values.A }} warnings'
          description: 'Detected {{ $values.A }} WARNING logs from instance {{ $labels.instance }}'
        labels:
          service: log-analyzer
          severity: warning

      - uid: log-processing-error-alert
        title: Log Processing Error Alert
        condition: A
        queries:
          - refId: A
            model:
              datasource: Prometheus
              expr: 'log_errors_total > 0'
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
        execErrState: Error
        for: 1m
        noDataState: NoData
        annotations:
          summary: '🔥 Log processing errors: {{ $values.A }}'
          description: 'Script encountered {{ $values.A }} errors while processing logs'
        labels:
          service: log-analyzer
          severity: critical